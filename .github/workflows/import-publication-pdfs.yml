name: Add publication PDF buttons

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/import-publication-pdfs.yml

permissions:
  contents: write

jobs:
  add-buttons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add PDF buttons
        shell: python
        run: |
          from pathlib import Path

          def buttons(pdf, supplements=None):
              result = (
                  f' <a href="{{{{ \'/publications/{pdf}\' | relative_url }}}}" '
                  'class="btn btn--small" download>PDF</a>'
              )
              if supplements:
                  result += (
                      f' <a href="{{{{ \'/publications/{supplements}\' | relative_url }}}}" '
                      'class="btn btn--small" download>Supplements</a>'
                  )
              return result

          pages = {
              "_pages/publications.md": [
                  ("  [[arXiv:2607.15617]](https://arxiv.org/abs/2607.15617) (2026.07.20).", "qrac_counterexample.pdf", None),
                  ("  [[arXiv:2607.00432]](https://arxiv.org/abs/2607.00432) (2026.07.01).", "2607.00432v2.pdf", None),
                  ("  [[arXiv:2605.03340]](https://arxiv.org/abs/2605.03340) (2026.05.06).", "2605.03340v1.pdf", None),
                  ("  [The European Physical Journal C **86**, 677 (2026)](https://link.springer.com/article/10.1140/epjc/s10052-026-15894-8) (2026.06.22)", "s10052-026-15894-8.pdf", None),
                  ("  [[arXiv:2501.04895]](https://arxiv.org/abs/2501.04895).", "ps1b-8l1x.pdf", None),
                  ("  [[arXiv:2303.08326]](https://arxiv.org/abs/2303.08326).", "PRA_113_022436_2026_Published_Article.pdf", None),
                  ("  [[arXiv:2410.20800]](https://arxiv.org/abs/2410.20800).", "s42005-025-01982-w.pdf", None),
                  ("  [Physical Review A **109**, 062614 (2024)](https://journals.aps.org/pra/abstract/10.1103/PhysRevA.109.062614) (2024.06.20).", "PhysRevA.109.062614.pdf", None),
                  ("  [[arXiv:2105.09557]](https://arxiv.org/abs/2105.09557).", "mori22a.pdf", None),
                  ("   [[arXiv:2102.05375]](https://arxiv.org/abs/2102.05375).", "4355_strength_of_minibatch_noise_in.pdf", None),
                  ("   [[arXiv:2012.03636]](https://arxiv.org/abs/2012.03636).", "liu21ad.pdf", "liu21ad-supp.pdf"),
                  ("   [[arXiv:1912.11797]](https://arxiv.org/abs/1912.11797).", "PhysRevLett.125.140602.pdf", "kqliu_SM_v3.pdf"),
              ],
              "_pages/publications_zh.md": [
                  ("   [[arXiv:1912.11797]](https://arxiv.org/abs/1912.11797).", "PhysRevLett.125.140602.pdf", "kqliu_SM_v3.pdf"),
                  ("   [[arXiv:2012.03636]](https://arxiv.org/abs/2012.03636).", "liu21ad.pdf", "liu21ad-supp.pdf"),
                  ("   [[arXiv:2102.05375]](https://arxiv.org/abs/2102.05375).", "4355_strength_of_minibatch_noise_in.pdf", None),
                  ("  [[arXiv:2105.09557]](https://arxiv.org/abs/2105.09557).", "mori22a.pdf", None),
                  ("  (IF = 2.9，中科院2区).", "PhysRevA.109.062614.pdf", None),
                  ("  [[arXiv:2410.20800]](https://arxiv.org/abs/2410.20800).", "s42005-025-01982-w.pdf", None),
                  ("  [[arXiv:2303.08326]](https://arxiv.org/abs/2303.08326).", "PRA_113_022436_2026_Published_Article.pdf", None),
                  ("  [[arXiv:2501.04895]](https://arxiv.org/abs/2501.04895).", "ps1b-8l1x.pdf", None),
                  ("  (IF = 4.9，中科院2区).", "s10052-026-15894-8.pdf", None),
                  ("  [[arXiv:2605.03340]](https://arxiv.org/abs/2605.03340) (2026.05.06).", "2605.03340v1.pdf", None),
                  ("  [[arXiv:2607.00432]](https://arxiv.org/abs/2607.00432) (2026.07.01).", "2607.00432v2.pdf", None),
                  ("  [[arXiv:2607.15617]](https://arxiv.org/abs/2607.15617) (2026.07.20).", "qrac_counterexample.pdf", None),
              ],
          }

          for filename, entries in pages.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for marker, pdf, supplements in entries:
                  addition = buttons(pdf, supplements)
                  if marker + addition in text:
                      continue
                  count = text.count(marker)
                  if count != 1:
                      raise RuntimeError(
                          f"Expected one exact marker in {filename}, found {count}: {marker}"
                      )
                  text = text.replace(marker, marker + addition, 1)
              path.write_text(text, encoding="utf-8")

      - name: Commit buttons and remove importer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _pages/publications.md _pages/publications_zh.md
          git rm .github/workflows/import-publication-pdfs.yml
          git commit -m "Add publication PDF download buttons"
          git push origin master
