name: Validate Jekyll site

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, ai-visual-refresh]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install Pillow

      - name: Generate publication thumbnails
        run: python scripts/generate_publication_thumbnails.py

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: ai-visual-site
          path: _site
          retention-days: 7
